<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ARC INDIPAY - TESTNET PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    
    <style>
        body { 
            background: linear-gradient(160deg, rgba(255,153,51,0.15) 0%, rgba(18,18,18,1) 50%, rgba(19,136,8,0.15) 100%) !important; 
            background-attachment: fixed; color: #f0f2f5; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center;
        }
        .app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; background: rgba(255,255,255,0.02); backdrop-filter: blur(10px); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; color: white; }
        .tiranga-text { background: linear-gradient(90deg, #FF9933 0%, #FFFFFF 50%, #138808 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .hidden { display: none !important; }
        input { background: rgba(255, 255, 255, 0.1) !important; border: 1px solid rgba(255,255,255,0.2) !important; color: white !important; outline: none; width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 10px; font-weight: bold; }
        
        /* Dropdown Custom */
        .dropdown { position: relative; }
        .dropdown-menu { display: none; position: absolute; right: 0; top: 45px; background: #1a1a1a; min-width: 160px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-radius: 12px; z-index: 1000; border: 1px solid #333; overflow: hidden; }
        .dropdown-menu button { width: 100%; text-align: left; padding: 12px 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: white; border-bottom: 1px solid #333; }
        .show { display: block !important; }
        .active-btn:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body onload="autoConnect()">

    <div class="app-container">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2">
                <h2 class="tiranga-text font-black italic tracking-tighter text-2xl uppercase">Arc Indipay</h2>
                <img src="logo.png" class="w-6 h-6 object-contain" onerror="this.style.display='none'">
            </div>
            
            <div class="dropdown">
                <button id="walletBtn" onclick="toggleProfile()" class="glass py-2 px-4 flex items-center gap-2 text-[10px] font-black uppercase tracking-tighter">
                    <span id="dot" class="bg-red-500 w-2 h-2 rounded-full animate-pulse"></span>
                    <span id="walletLabel">Connect Wallet</span>
                </button>
                <div id="profileMenu" class="dropdown-menu">
                    <button onclick="copyAddr()"><i class="fa-solid fa-copy mr-2"></i>Copy Address</button>
                    <button onclick="disconnectWallet()" style="color: #ff4444;"><i class="fa-solid fa-power-off mr-2"></i>Disconnect</button>
                </div>
            </div>
        </div>

        <div class="glass p-10 mb-8 text-center shadow-2xl">
            <p class="text-[10px] opacity-60 mb-2 font-mono uppercase tracking-widest text-white">Arc Network (Testnet)</p>
            <h1 class="text-5xl font-black italic tracking-tighter text-white"><span id="usdcBal">0.00</span> <span class="text-2xl opacity-40">USDC</span></h1>
            <p class="text-xl font-bold mt-2 text-blue-400">≈ ₹<span id="inrBal">0.00</span></p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div onclick="openSendModal()" class="glass p-8 text-center active-btn cursor-pointer"><i class="fa-solid fa-paper-plane text-3xl mb-3 text-[#FF9933]"></i><p class="text-xs font-black uppercase italic">Send</p></div>
            <div onclick="openReceiveModal()" class="glass p-8 text-center active-btn cursor-pointer"><i class="fa-solid fa-qrcode text-3xl mb-3 text-[#FFFFFF]"></i><p class="text-xs font-black uppercase italic">Receive</p></div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div onclick="alert('Scanner Coming Soon')" class="glass p-8 text-center active-btn cursor-pointer"><i class="fa-solid fa-expand text-3xl mb-3 text-[#138808]"></i><p class="text-xs font-black uppercase italic">Scan & Pay</p></div>
            <div onclick="getTxLogs()" class="glass p-8 text-center active-btn cursor-pointer"><i class="fa-solid fa-clock-rotate-left text-3xl mb-3 opacity-40"></i><p class="text-xs font-black uppercase italic">History</p></div>
        </div>

        <div class="glass p-6 mb-6">
            <h3 class="text-blue-400 font-black italic text-sm mb-5 uppercase tracking-widest">Bookings & Tickets</h3>
            <div class="grid grid-cols-4 gap-2 text-center">
                <div onclick="startFlow('flight')" class="glass py-4 active-btn"><i class="fa-solid fa-plane text-[#FF9933]"></i><p class="text-[8px] font-black italic mt-1">FLIGHT</p></div>
                <div onclick="startFlow('bus')" class="glass py-4 active-btn"><i class="fa-solid fa-bus text-[#138808]"></i><p class="text-[8px] font-black italic mt-1">BUS</p></div>
                <div onclick="startFlow('train')" class="glass py-4 active-btn"><i class="fa-solid fa-train text-[#FF9933]"></i><p class="text-[8px] font-black italic mt-1">TRAIN</p></div>
                <div onclick="startFlow('hotel')" class="glass py-4 active-btn"><i class="fa-solid fa-hotel text-[#138808]"></i><p class="text-[8px] font-black italic mt-1">HOTEL</p></div>
            </div>
        </div>

        <div class="glass p-6 text-[10px] italic font-black uppercase tracking-widest text-center">
            <p class="opacity-40 mb-4">Latest Transactions</p>
            <div id="txList" class="space-y-3 text-left"></div>
        </div>
    </div>

    <div id="sendModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-[300]">
        <div class="glass p-8 w-full max-w-sm" style="background: #111; border: 1px solid #333;">
            <h2 class="text-xl font-black italic mb-6 tiranga-text uppercase">Send USDC</h2>
            <input type="text" id="sendTo" placeholder="Recipient Address 0x...">
            <input type="number" id="sendAmount" placeholder="Amount">
            <div class="flex gap-2 mt-4">
                <button onclick="closeModal('sendModal')" class="w-1/2 py-4 bg-white/10 rounded-xl font-bold">CANCEL</button>
                <button onclick="processSend()" id="confirmSendBtn" class="w-1/2 py-4 bg-blue-600 rounded-xl font-bold">SEND NOW</button>
            </div>
        </div>
    </div>

    <div id="receiveModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-[300]">
        <div class="glass p-8 w-full max-w-sm text-center" style="background: white; color: black;">
            <h2 class="text-xl font-black italic mb-6 uppercase text-[#000080]">Your Receive QR</h2>
            <div id="qrcode" class="flex justify-center bg-white p-4 rounded-xl mb-4 border"></div>
            <p id="myAddrLabel" class="text-[9px] font-mono break-all mb-6 opacity-60"></p>
            <button onclick="closeModal('receiveModal')" class="w-full py-4 bg-[#000080] text-white rounded-xl font-bold">CLOSE</button>
        </div>
    </div>

    <div id="bookingOverlay" class="fixed inset-0 bg-black/95 z-[150] hidden p-6 flex flex-col font-bold">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="closeFlow()" class="text-2xl text-white">&larr;</button>
            <h2 id="flowTitle" class="text-xl italic font-black uppercase tiranga-text">Search</h2>
        </div>
        <div id="flowContent" class="space-y-4"></div>
        <div id="resultsInject" class="space-y-4 mt-6"></div>
        <div id="bottomBar" class="fixed bottom-0 left-0 right-0 p-6 bg-[#000080] hidden rounded-t-3xl">
            <p id="totalPrice" class="text-white text-[10px] mb-3 text-center uppercase font-black"></p>
            <button onclick="finalPay()" id="payBtn" class="w-full bg-white text-[#000080] py-5 rounded-2xl font-black text-xl uppercase italic">Confirm & Pay</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
