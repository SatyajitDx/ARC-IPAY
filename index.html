<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ARC INDIPAY - FINAL PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    
    <style>
        /* Dark Tiranga Background */
        body { 
            background: linear-gradient(135deg, #2d1804 0%, #1a1a1a 50%, #051a05 100%) !important; 
            color: #f0f2f5; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center;
        }

        /* App Container for Desktop & Mobile */
        .app-container { 
            width: 100%; 
            max-width: 450px; 
            min-height: 100vh;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        
        /* High Visibility Tiranga Text */
        .tiranga-text {
            background: linear-gradient(90deg, #FF9933 10%, #FFFFFF 50%, #138808 90%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; text-transform: uppercase; font-style: italic;
            filter: drop-shadow(2px 2px 1px rgba(0, 0, 0, 0.8));
        }

        .logo-box { display: flex; align-items: center; gap: 8px; background: rgba(0, 0, 0, 0.4); padding: 8px 15px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .dropdown { position: relative; }
        .dropdown-menu { display: none; position: absolute; left: 0; top: 45px; background: #1a1a1a; min-width: 150px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        .dropdown-menu button { width: 100%; text-align: left; padding: 12px 15px; font-size: 10px; font-weight: bold; color: white; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .show { display: block !important; }

        input { background: rgba(255,255,255,0.1) !important; color: white !important; outline: none; width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .bottom-pay { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #000080; padding: 20px; z-index: 100; text-align: center; border-radius: 24px 24px 0 0; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body onload="autoConnect()">

    <div class="app-container">
        <div class="flex justify-between items-center mb-8">
            <div class="dropdown">
                <button id="walletBtn" onclick="toggleProfile()" class="glass py-2 px-4 flex items-center gap-2 text-[10px] font-black uppercase text-white">
                    <span id="dot" class="bg-red-500 w-2 h-2 rounded-full"></span>
                    <span id="walletLabel">Connect Wallet</span>
                    <i class="fa-solid fa-caret-down opacity-50"></i>
                </button>
                <div id="profileMenu" class="dropdown-menu">
                    <button onclick="copyAddr()">Copy Address</button>
                    <button onclick="disconnectWallet()">Disconnect</button>
                </div>
            </div>
            
            <div class="logo-box">
                <h2 class="tiranga-text text-lg tracking-tighter">Arc Indipay</h2>
                <img src="logo.png" class="w-6 h-6 object-contain" onerror="this.style.display='none'">
            </div>
        </div>

        <div id="dashboardView">
            <div class="glass p-8 mb-8 text-center shadow-2xl">
                <p class="text-[9px] opacity-40 mb-2 uppercase tracking-widest">Arc Network (Testnet)</p>
                <h1 class="text-5xl font-black italic tracking-tighter"><span id="usdcBal">0.00</span> <span class="text-2xl opacity-30">USDC</span></h1>
                <p class="text-xl font-bold mt-2 text-blue-300">≈ ₹<span id="inrBal">0.00</span></p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div onclick="openSend()" class="glass p-8 text-center active:scale-95"><i class="fa-solid fa-paper-plane text-2xl mb-3 text-orange-400"></i><p class="text-[10px] font-black italic uppercase">Send</p></div>
                <div onclick="openReceive()" class="glass p-8 text-center active:scale-95"><i class="fa-solid fa-qrcode text-2xl mb-3 text-blue-400"></i><p class="text-[10px] font-black italic uppercase">Receive</p></div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div onclick="alert('Scanner Coming Soon')" class="glass p-8 text-center active:scale-95"><i class="fa-solid fa-expand text-2xl mb-3 text-green-400"></i><p class="text-[10px] font-black italic uppercase">Scan & Pay</p></div>
                <div onclick="getTxLogs()" class="glass p-8 text-center active:scale-95"><i class="fa-solid fa-clock-rotate-left text-2xl mb-3 opacity-30"></i><p class="text-[10px] font-black italic uppercase">History</p></div>
            </div>

            <div class="glass p-6 mb-6">
                <h3 class="text-blue-400 font-black italic text-xs mb-5 uppercase tracking-widest">Bookings & Tickets</h3>
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div onclick="startFlow('flight')" class="glass py-4"><i class="fa-solid fa-plane text-orange-400"></i><p class="text-[8px] font-black italic mt-1">FLIGHT</p></div>
                    <div onclick="startFlow('bus')" class="glass py-4"><i class="fa-solid fa-bus text-green-400"></i><p class="text-[8px] font-black italic mt-1">BUS</p></div>
                    <div onclick="startFlow('train')" class="glass py-4"><i class="fa-solid fa-train text-orange-400"></i><p class="text-[8px] font-black italic mt-1">TRAIN</p></div>
                    <div onclick="startFlow('hotel')" class="glass py-4"><i class="fa-solid fa-hotel text-green-400"></i><p class="text-[8px] font-black italic mt-1">HOTEL</p></div>
                </div>
            </div>

            <div class="glass p-6 mb-10">
                <h3 class="text-blue-400 font-black italic text-xs mb-5 uppercase tracking-widest">Bills & Recharges</h3>
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div onclick="startFlow('mobile')" class="glass py-4"><i class="fa-solid fa-mobile-screen text-orange-400"></i><p class="text-[8px] font-black italic mt-1">MOBILE</p></div>
                    <div onclick="startFlow('electric')" class="glass py-4"><i class="fa-solid fa-lightbulb text-green-400"></i><p class="text-[8px] font-black italic mt-1">ELECTRIC</p></div>
                    <div onclick="startFlow('dth')" class="glass py-4"><i class="fa-solid fa-tv text-orange-400"></i><p class="text-[8px] font-black italic mt-1">DTH</p></div>
                    <div onclick="startFlow('wifi')" class="glass py-4"><i class="fa-solid fa-wifi text-green-400"></i><p class="text-[8px] font-black italic mt-1">WIFI</p></div>
                </div>
            </div>

            <div id="txList" class="text-[10px] italic font-black uppercase tracking-widest text-center opacity-30 pb-10">Latest Transactions (Arc Testnet)</div>
        </div>

        <div id="bookingOverlay" class="fixed inset-0 bg-white z-[150] hidden p-6 flex flex-col font-bold text-black">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="location.reload()" class="text-2xl">&larr;</button>
                <h2 id="flowTitle" class="text-xl italic font-black uppercase text-[#000080]">Search</h2>
            </div>
            <div id="flowContent" class="space-y-4"></div>
            <div id="resultsInject" class="space-y-4 mt-6"></div>
            <div id="bottomBar" class="bottom-pay">
                <p id="totalPrice" class="text-white text-[10px] mb-3"></p>
                <button onclick="finalPay()" id="payBtn" class="w-full bg-white text-[#000080] py-5 rounded-2xl font-black text-xl uppercase italic active:scale-95">Confirm & Pay</button>
            </div>
        </div>

        <div id="sendModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-[300]">
            <div class="glass p-8 w-full max-w-sm" style="background: white;">
                <h3 class="font-black mb-4 uppercase text-[#000080]">Send USDC</h3>
                <input type="text" id="sendAddr" placeholder="Recipient 0x...">
                <input type="number" id="sendAmt" placeholder="Amount">
                <div class="flex gap-2 mt-4">
                    <button onclick="closeModal('sendModal')" class="w-1/2 py-3 bg-gray-200 rounded-xl text-black">Back</button>
                    <button onclick="processSend()" id="sendS" class="w-1/2 py-3 bg-[#000080] text-white rounded-xl">Send</button>
                </div>
            </div>
        </div>

        <div id="receiveModal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-[300]">
            <div class="glass p-8 w-full max-w-sm text-center" style="background: white;">
                <h3 class="font-black mb-6 uppercase text-[#000080]">Your Address</h3>
                <div id="qrcode" class="bg-white p-4 rounded-xl inline-block mb-4 border"></div>
                <p id="myFullAddr" class="text-[10px] font-mono break-all mb-6 text-black"></p>
                <button onclick="closeModal('receiveModal')" class="w-full bg-[#000080] text
