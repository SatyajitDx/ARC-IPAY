<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ARC INDIPAY - FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { 
            background: linear-gradient(135deg, #2d1804 0%, #1a1a1a 50%, #051a05 100%) !important; 
            color: #f0f2f5; font-family: sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center;
        }
        .app-container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        
        /* Tiranga Name Style */
        .tiranga-text {
            background: linear-gradient(90deg, #FF9933 10%, #FFFFFF 50%, #138808 90%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; text-transform: uppercase; font-style: italic;
            filter: drop-shadow(2px 2px 1px rgba(0, 0, 0, 0.8));
        }

        /* Dropdown Design */
        .dropdown { position: relative; }
        .dropdown-menu { 
            display: none; position: absolute; left: 0; top: 45px; 
            background: #ffffff; min-width: 160px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; 
        }
        .dropdown-menu button { width: 100%; text-align: left; padding: 12px 15px; font-size: 11px; font-weight: bold; color: #333; border-bottom: 1px solid #eee; }
        .dropdown-menu button:last-child { color: red; border: none; }
        .show { display: block !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="flex justify-between items-center mb-10">
            <div class="dropdown">
                <button id="walletBtn" onclick="toggleProfile()" class="glass py-2 px-4 flex items-center gap-2 text-[10px] font-black uppercase text-white">
                    <span id="dot" class="bg-red-500 w-2 h-2 rounded-full animate-pulse"></span>
                    <span id="walletLabel">Connect Wallet</span>
                    <i class="fa-solid fa-caret-down opacity-50"></i>
                </button>
                <div id="profileMenu" class="dropdown-menu">
                    <button onclick="copyAddr()"><i class="fa-solid fa-copy mr-2"></i>Copy Address</button>
                    <button onclick="disconnectWallet()"><i class="fa-solid fa-power-off mr-2"></i>Disconnect</button>
                </div>
            </div>
            
            <div class="flex items-center gap-2 bg-black/40 p-2 px-4 rounded-2xl border border-white/10">
                <h2 class="tiranga-text text-lg tracking-tighter">Arc Indipay</h2>
                <img src="logo.png" class="w-6 h-6 object-contain" onerror="this.style.display='none'">
            </div>
        </div>

        <div class="glass p-10 mb-8 text-center shadow-2xl">
            <p class="text-[9px] opacity-40 mb-2 uppercase tracking-widest">Arc Network (Testnet)</p>
            <h1 class="text-5xl font-black italic tracking-tighter"><span id="usdcBal">0.00</span> <span class="text-2xl opacity-30">USDC</span></h1>
            <p class="text-xl font-bold mt-2 text-blue-300">≈ ₹<span id="inrBal">0.00</span></p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div onclick="alert('Send Clicked')" class="glass p-8 text-center active:scale-95"><i class="fa-solid fa-paper-plane text-2xl mb-3 text-orange-400"></i><p class="text-[10px] font-black italic">SEND</p></div>
            <div onclick="alert('Receive Clicked')" class="glass p-8 text-center active:scale-95"><i class="fa-solid fa-qrcode text-2xl mb-3 text-blue-400"></i><p class="text-[10px] font-black italic">RECEIVE</p></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div onclick="alert('Scanner Ready')" class="glass p-8 text-center active:scale-95"><i class="fa-solid fa-expand text-2xl mb-3 text-green-400"></i><p class="text-[10px] font-black italic">SCAN & PAY</p></div>
            <div onclick="alert('History Ready')" class="glass p-8 text-center active:scale-95"><i class="fa-solid fa-clock-rotate-left text-2xl mb-3 opacity-30"></i><p class="text-[10px] font-black italic">HISTORY</p></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
