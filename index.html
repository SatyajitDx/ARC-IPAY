<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ARC INDIPAY - TRANSPARENT EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    
    <style>
        /* Transparent Dark Tiranga Background */
        body { 
            background: linear-gradient(160deg, 
                rgba(255, 153, 51, 0.15) 0%,   /* Transparent Saffron */
                rgba(18, 18, 18, 1) 50%,       /* Solid Dark Center */
                rgba(19, 136, 8, 0.15) 100%    /* Transparent Green */
            ) !important; 
            background-attachment: fixed;
            color: #f0f2f5; font-family: sans-serif; margin: 0; min-height: 100vh;
            display: flex; justify-content: center;
        }

        .app-container { 
            width: 100%; max-width: 450px; min-height: 100vh;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            padding: 20px; box-sizing: border-box;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        
        .tiranga-text {
            background: linear-gradient(90deg, #FF9933 10%, #FFFFFF 50%, #138808 90%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; text-transform: uppercase; font-style: italic;
        }

        .dropdown-menu { 
            display: none; position: absolute; left: 0; top: 45px; 
            background: #1a1a1a; min-width: 160px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; border: 1px solid rgba(255,255,255,0.1);
        }
        .dropdown-menu button { width: 100%; text-align: left; padding: 12px 15px; font-size: 10px; font-weight: bold; color: white; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .show { display: block !important; }

        input { background: rgba(255,255,255,0.08) !important; color: white !important; outline: none; width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="flex justify-between items-center mb-8">
            <div class="relative">
                <button id="walletBtn" onclick="toggleProfile()" class="glass py-2 px-4 flex items-center gap-2 text-[10px] font-black uppercase text-white">
                    <span id="dot" class="bg-red-500 w-2 h-2 rounded-full animate-pulse"></span>
                    <span id="walletLabel">Connect Wallet</span>
                    <i class="fa-solid fa-caret-down opacity-50"></i>
                </button>
                <div id="profileMenu" class="dropdown-menu">
                    <button onclick="copyAddr()">Copy Address</button>
                    <button onclick="disconnectWallet()" style="color: #ff4444;">Disconnect</button>
                </div>
            </div>
            
            <div class="flex items-center gap-2 bg-black/40 p-2 px-3 rounded-xl border border-white/10">
                <h2 class="tiranga-text text-lg tracking-tighter">Arc Indipay</h2>
                <img src="logo.png" class="w-5 h-5 object-contain" onerror="this.style.display='none'">
            </div>
        </div>

        <div class="glass p-10 mb-8 text-center shadow-2xl">
            <p class="text-[9px] opacity-40 mb-2 uppercase tracking-widest">Arc Network (Testnet)</p>
            <h1 class="text-5xl font-black italic tracking-tighter"><span id="usdcBal">0.00</span> <span class="text-2xl opacity-20">USDC</span></h1>
            <p class="text-xl font-bold mt-2 text-blue-400">≈ ₹<span id="inrBal">0.00</span></p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div onclick="openSend()" class="glass p-8 text-center active:scale-95 cursor-pointer"><i class="fa-solid fa-paper-plane text-2xl mb-3 text-orange-400"></i><p class="text-[10px] font-black uppercase italic">Send</p></div>
            <div onclick="openReceive()" class="glass p-8 text-center active:scale-95 cursor-pointer"><i class="fa-solid fa-qrcode text-2xl mb-3 text-blue-400"></i><p class="text-[10px] font-black uppercase italic">Receive</p></div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div onclick="alert('Coming Soon')" class="glass p-8 text-center active:scale-95 cursor-pointer"><i class="fa-solid fa-expand text-2xl mb-3 text-green-400"></i><p class="text-[10px] font-black uppercase italic">Scan & Pay</p></div>
            <div onclick="getTxLogs()" class="glass p-8 text-center active:scale-95 cursor-pointer"><i class="fa-solid fa-clock-rotate-left text-2xl mb-3 opacity-20"></i><p class="text-[10px] font-black uppercase italic">History</p></div>
        </div>

        <div id="txList" class="text-center opacity-20 text-[9px] uppercase font-black tracking-widest">Latest Transactions (Arc Testnet)</div>
    </div>

    <div id="sendModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[300]">
        <div class="glass p-
